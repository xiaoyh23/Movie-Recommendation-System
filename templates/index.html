<!DOCTYPE html>
<html>
<head>
    <title>电影推荐</title>
</head>
<body>
    <h1>电影推荐系统</h1>
    <form method="post">
        <input type="text" name="movie" placeholder="输入电影名，如：Toy Story">
        <button type="submit">推荐</button>
    </form>
    {% if recommendations %}
        <h2>推荐结果：</h2>
        <ul>
        {% for movie in recommendations %}
            <li>{{ movie }}</li>
        {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
